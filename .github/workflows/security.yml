name: DevSecOps Security Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read
  security-events: write
  actions: read
  pull-requests: write

jobs:
  secret-scanning:
    name: Secrets Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          report-format: sarif
          save-report: true

  dependency-scan:
    name: Dependency Scanning (govulncheck)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.3'

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  code-scanning:
    name: Static Analysis (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      security-events: write 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: go  

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:go"

  container-scan:
    name: Container Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t invoicer:scan .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'invoicer:scan'
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '1'  
          severity: 'CRITICAL,HIGH'  

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
  publish:
    name: Publish to GitHub Container Registry
    runs-on: ubuntu-latest
    needs: [secret-scanning, dependency-scan, code-scanning, container-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Docker image
        run: docker build -t invoicer:latest -t invoicer:${{ github.sha }} .
      - name: Tag image for GHCR
        run: |
          docker tag invoicer:latest ghcr.io/${{ github.repository }}/invoicer:latest
          docker tag invoicer:${{ github.sha }} ghcr.io/${{ github.repository }}/invoicer:${{ github.sha }}
      - name: Push to GitHub Container Registry
        run: |
          docker push ghcr.io/${{ github.repository }}/invoicer:latest
          docker push ghcr.io/${{ github.repository }}/invoicer:${{ github.sha }}
      - name: Image info
        run: |
          echo "Image published to: ghcr.io/${{ github.repository }}/invoicer"
          echo "Tags: latest, ${{ github.sha }}"