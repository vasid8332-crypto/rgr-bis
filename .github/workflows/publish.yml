name: Publish Docker Image
on:
  push:
    branches: [ main, master ]
permissions:
  contents: read
  packages: write  
jobs:
  publish:
    name: Build and Publish to GHCR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Docker image
        run: docker build -t invoicer:latest -t invoicer:${{ github.sha }} .
      - name: Tag image for GHCR
        run: |
          docker tag invoicer:latest ghcr.io/${{ github.repository }}/invoicer:latest
          docker tag invoicer:${{ github.sha }} ghcr.io/${{ github.repository }}/invoicer:${{ github.sha }}
      - name: Push to GitHub Container Registry
        run: |
          docker push ghcr.io/${{ github.repository }}/invoicer:latest
          docker push ghcr.io/${{ github.repository }}/invoicer:${{ github.sha }}
      - name: Image info
        run: |
          echo "Image published to: ghcr.io/${{ github.repository }}/invoicer"
          echo "Tags: latest, ${{ github.sha }}"